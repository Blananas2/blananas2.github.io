<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" href="img/favicon.ico" />
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1">
    <title>Blananas2</title>
  </head>
  <style>
    @font-face {
      font-family: 'Px437 IBM VGA 8x16';
      src: url(font/Px437_IBM_VGA_8x16.ttf);
    }

    * {
      font-family: 'Px437 IBM VGA 8x16', Courier, monospace;
      color: yellow;
      image-rendering: crisp-edges; /* Firefox */
      image-rendering: pixelated; /* Chrome */
    }

    body {
      background-color: #242424;
      font-size: 32px;
    }

    .hstack {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
    }

    ul.list {
      list-style: none;
      margin-left: 10em;
    }

    button {
      background-color: gold;
      color: black;
      font-size: 32px;
    }

  </style>
  <body>
    <div class="hstack">
      <p style="font-size: 48px;">Blananas2&nbsp;</p>
      <img src="img/Blan.png" style="width: 2em;"/>
      <p>&nbsp;Everyone's favorite punching bag. Here's some stuff that I've made, enjoy!</p>
    </div>

    <ul class="list">
      <li>• <a href="./aboutme.html">About Me</a></li>
      <li>• <a href="./inktober2024.html">Inktober 2024 Showcase</a></li>
      <li>• <a href="./quickfunctions.html">Quick Functions</a></li>
      <li>• <a href="./goldenyapping.html">Celeste "in which i yap about golden strats"</a></li>
      <li>• <a href="./wordlistchecker.html">KTANE Wordlist Checker</a></li>
      <li>• <a href="./modsymbollist.html">KTANE Symbol List</a></li>
      <li>• <button onclick="moduleList()" title="Click to give a text file containing every KTANE module's name.">modules.txt</button></li>
      <li>• The <a href="https://github.com/Blananas2/blananas2.github.io">GitHub</a> for this site</li>
    </ul>
  </body>
  <script>
    let button = document.getElementsByTagName("button")[0];

    function moduleList() {
      fetchRepoData()
      .then(ktane => {
        downloadFile("modules.txt", ktane.join('\n'), "text/plain");
      });
    }

    async function fetchRepoData() {
      button.innerText = "Please wait for repository...";

      let ktane = [];

      let request = await fetch("https://ktane.timwi.de/json/raw");
      let reqJson = JSON.parse(await request.text()).KtaneModules;

      reqJson.forEach(entry => {
        if ((entry.Type === "Regular" || entry.Type === "Needy") && !entry.TranslationOf) {
          let moduleName = entry.FileName ?? entry.Name;
          ktane.push(moduleName
            .replaceAll('’', '\'')
            .replaceAll('×', 'x')
          );
        }
      });

      button.innerText = "modules.txt";

      return ktane;
    }

    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);

      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      link.style.display = 'none';

      document.body.appendChild(link);
      link.click();

      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }
  </script>
</html>
